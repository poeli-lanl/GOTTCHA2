name: Docker Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.id }}
  cancel-in-progress: false

env:
  IMAGE_NAME: poeli/gottcha2

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: poeli
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          sanitize_tag() {
            printf '%s' "$1" \
              | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//; s/-+/-/g' \
              | cut -c1-128
          }

          release_tag="$(sanitize_tag "$RELEASE_NAME")"
          if [ -z "$release_tag" ]; then
            release_tag="$(sanitize_tag "$RELEASE_TAG")"
          fi

          if [ -z "$release_tag" ]; then
            echo "Could not derive a valid Docker tag from the release name or tag." >&2
            exit 1
          fi

          {
            echo "release_tag=$release_tag"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${release_tag}"
            echo "${IMAGE_NAME}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
